name: Main Validation

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.hcl"
      - ".github/workflows/main-validation.yml"
      - "test/**"
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: "Run integration tests (requires AWS credentials)"
        type: boolean
        default: false

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_VERSION: "1.14.7"
  TFLINT_VERSION: "v0.55.0"

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Static analysis (no credentials required)
  # ---------------------------------------------------------------
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache TFLint plugins
        uses: actions/cache@v5
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('.tflint.hcl') }}
          restore-keys: tflint-

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Init TFLint
        run: tflint --init

      - name: Lint root module
        run: tflint --recursive

  # ---------------------------------------------------------------
  # Stage 2: Validation (depends on format)
  # ---------------------------------------------------------------
  validate:
    name: Validate (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [fmt]

    strategy:
      fail-fast: false
      matrix:
        target: [root, basic, full, advanced]
        include:
          - target: root
            dir: "."
          - target: basic
            dir: "examples/basic"
          - target: full
            dir: "examples/full"
          - target: advanced
            dir: "examples/advanced"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.dir }}/.terraform
            ${{ matrix.dir }}/.terraform.lock.hcl
          key: terraform-${{ matrix.target }}-${{ hashFiles(format('{0}/**/*.tf', matrix.dir)) }}
          restore-keys: terraform-${{ matrix.target }}-

      - name: Terraform Init
        working-directory: ${{ matrix.dir }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.dir }}
        run: terraform validate

  # ---------------------------------------------------------------
  # Stage 3: Security scanning
  # ---------------------------------------------------------------
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [fmt]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (Terraform misconfiguration scan)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------
  # Stage 4: Test suite compilation
  # ---------------------------------------------------------------
  test-compile:
    name: Test Suite Compile Check
    runs-on: ubuntu-latest
    needs: [fmt]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: test/go.sum

      - name: Verify dependencies
        working-directory: test
        run: |
          go mod tidy -diff
          go mod verify

      - name: Compile test suite
        working-directory: test
        run: go build ./...

      - name: Run go vet
        working-directory: test
        run: go vet ./...

  # ---------------------------------------------------------------
  # Stage 5: Integration tests (requires AWS credentials)
  #
  # This job is gated: it only runs when credentials are available.
  # Without creds, it skips gracefully — the pipeline still passes.
  # ---------------------------------------------------------------
  check-credentials:
    name: Check AWS Credentials
    runs-on: ubuntu-latest
    needs: [validate, test-compile]
    outputs:
      has_creds: ${{ steps.check.outputs.has_creds }}
    steps:
      - name: Check for AWS credentials
        id: check
        run: |
          if [[ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" && -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
            echo "AWS credentials found. Integration tests will run."
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "No AWS credentials configured. Integration tests will be skipped."
          fi

  integration-test:
    name: Integration Test (${{ matrix.test }})
    runs-on: ubuntu-latest
    needs: [check-credentials]
    if: needs.check-credentials.outputs.has_creds == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration_tests == 'true')
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        test:
          - LandingZoneBasic
          - LandingZoneFull
          - VPCModule
          - CloudTrailModule
          - ConfigModule
          - IAMModule
          - GuardDutyModule
          - BudgetModule
          - SecurityHubModule
          - MacieModule

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: test/go.sum

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Test - ${{ matrix.test }}
        working-directory: test
        env:
          GOFLAGS: "-count=1"
        run: go test -timeout 30m -v -run "^Test${{ matrix.test }}$" ./...

  # ---------------------------------------------------------------
  # Stage 6: Documentation checks
  # ---------------------------------------------------------------
  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module structure
        run: |
          echo "Checking required files..."
          required_files=(
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            "main.tf"
            "variables.tf"
            "outputs.tf"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "FAIL: Missing required file: $f"
              exit 1
            fi
            echo "  OK: $f"
          done

          echo ""
          echo "Checking required directories..."
          required_dirs=(
            "docs"
            "examples/basic"
            "examples/full"
            "examples/advanced"
            "modules"
            "test"
          )
          for d in "${required_dirs[@]}"; do
            if [ ! -d "$d" ]; then
              echo "FAIL: Missing required directory: $d"
              exit 1
            fi
            echo "  OK: $d/"
          done

          echo ""
          echo "Checking submodule structure..."
          for mod_dir in modules/*/; do
            for f in main.tf variables.tf outputs.tf; do
              if [ ! -f "${mod_dir}${f}" ]; then
                echo "FAIL: Missing ${mod_dir}${f}"
                exit 1
              fi
            done
            echo "  OK: ${mod_dir}"
          done

          echo ""
          echo "All structure checks passed."

  # ---------------------------------------------------------------
  # Summary gate
  # ---------------------------------------------------------------
  main-status:
    name: Main Status
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, lint, validate, security-scan, test-compile, documentation, integration-test]
    steps:
      - name: Check results
        run: |
          echo "=== Required Jobs ==="
          echo "fmt:           ${{ needs.fmt.result }}"
          echo "lint:          ${{ needs.lint.result }}"
          echo "validate:      ${{ needs.validate.result }}"
          echo "security-scan: ${{ needs.security-scan.result }}"
          echo "test-compile:  ${{ needs.test-compile.result }}"
          echo "documentation: ${{ needs.documentation.result }}"
          echo ""
          echo "=== Optional Jobs (require AWS credentials) ==="
          echo "integration:   ${{ needs.integration-test.result }}"

          if [[ "${{ needs.fmt.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.validate.result }}" != "success" || \
                "${{ needs.test-compile.result }}" != "success" || \
                "${{ needs.documentation.result }}" != "success" ]]; then
            echo ""
            echo "One or more required checks failed."
            exit 1
          fi

          if [[ "${{ needs.integration-test.result }}" == "failure" ]]; then
            echo ""
            echo "WARNING: Integration tests failed."
            exit 1
          fi

          echo ""
          echo "All checks passed."
